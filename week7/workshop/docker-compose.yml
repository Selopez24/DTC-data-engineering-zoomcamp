services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.2
    container_name: workshop-redpanda-1
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://localhost:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://localhost:8082,external://localhost:18082
    environment:
      PANDAPROXY_USERNAME: ""
      PANDAPROXY_PASSWORD: ""
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--admin-api-host", "localhost", "9644"]
      interval: 5s
      timeout: 2s
      retries: 5

  jobmanager:
    build: .
    image: workshop-flink:latest
    container_name: workshop-jobmanager-1
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 10s
    volumes:
      - ./src:/opt/src/job

  taskmanager:
    build: .
    image: workshop-flink:latest
    container_name: workshop-taskmanager-1
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 10s

  postgres:
    image: postgres:15
    container_name: workshop-postgres-1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
